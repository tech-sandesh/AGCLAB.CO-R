<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGC LAB.CO | Logs & Records</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="site-nav">
    <div class="brand">AGC LAB.CO</div>
    <div class="links">
      <a href="/inventory">Inventory</a>
      <a href="/logs-records" class="active">Logs & Records</a>
      <a href="/about">About</a>
      <a href="/" onclick="localStorage.removeItem('agc_user'); window.location.href='/'; return false;">Logout</a>
    </div>
  </nav>

  <main class="page reports-page">
    <section class="toolbar">
      <h1>Logs & Records</h1>
      <div>
        <button id="printLogsBtn" class="btn">Print Logs</button>
        <button id="printLowStockBtn" class="btn">Print Stock Chemicals</button>
      </div>
    </section>

    <section class="logs-filters">
      <input id="filterDate" type="date" />
      <input id="filterClass" type="text" placeholder="Filter by class" />
      <input id="filterUser" type="text" placeholder="Filter by user" />
      <input id="filterChemical" type="text" placeholder="Filter by chemical" />
    </section>

    <section id="logsReportCard" class="report-card">
      <h2>Logs Report</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Chemical</th>
            <th>Action</th>
            <th>Amount</th>
            <th>User</th>
            <th>Purpose</th>
            <th>Class</th>
          </tr>
        </thead>
        <tbody id="logsTableBody"></tbody>
      </table>
    </section>

    <section id="lowStockReportCard" class="report-card">
      <h2>Low Stock / Wanted Chemicals Report</h2>
      <div class="no-print">
        <button id="addManualWantedBtn" class="btn" type="button">+ Add Manual Wanted Item</button>
        <button id="clearManualWantedBtn" class="btn" type="button">Clear Manual Items</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Chemical</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Signature</th>
          </tr>
        </thead>
        <tbody id="lowStockTableBody"></tbody>
      </table>
    </section>
  </main>

  <footer class="site-footer">
    <p>AGC LAB.CO | Chemical Inventory Management System</p>
  </footer>

  <div id="manualWantedModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2>Add Wanted Chemical</h2>
      <form id="manualWantedForm">
        <label>Chemical</label>
        <select id="manualChemicalSelect" required></select>

        <label>Quantity (optional)</label>
        <input id="manualQuantity" type="text" />

        <div class="modal-actions">
          <button type="submit" class="btn primary">Add</button>
          <button type="button" id="closeManualWantedModal" class="btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
